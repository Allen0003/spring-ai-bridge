<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金融 AI 助理</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            background-color: #1f1f1f;
            text-align: center;
            border-bottom: 1px solid #333;
            font-weight: bold;
            font-size: 1.2rem;
            color: #00e676; /* 科技綠 */
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
        }

        .ai {
            align-self: flex-start;
            background-color: #2c2c2c;
            border: 1px solid #444;
        }

        .source-tag {
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #555;
        }

        .input-area {
            padding: 20px;
            background-color: #1f1f1f;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 5px;
            outline: none;
        }

        button {
            background-color: #00e676;
            color: #121212;
            border: none;
            padding: 0 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #00c853;
        }
    </style>
</head>
<body>

<header>金融科技 AI 助理</header>

<div id="chat-container">
    <div class="message ai">您好！我是您的金融助理，請問今天能幫您查詢什麼法規或交易資訊嗎？</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="請輸入您的問題..." onkeypress="handleKeyPress(event)">
    <button onclick="sendMessage()">發送</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');

    function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg) return;

        // 1. 顯示使用者訊息
        appendMessage('user', msg);
        userInput.value = '';

        // 2. 顯示 AI 正在思考的狀態
        const aiMsgDiv = appendMessage('ai', '思考中...');

        try {
            // 3. 呼叫你的 Spring Boot 後端
            const response = await fetch(`http://localhost:8080/api/ai/chat?msg=${encodeURIComponent(msg)}`);
            const data = await response.json();

            // 4. 更新 AI 回答與來源
            let contentHtml = data.answer.replace(/\n/g, '<br>');

            if (data.sources && data.sources.length > 0) {
                contentHtml += '<div class="source-tag">參考來源：<br>' + data.sources.join('<br>') + '</div>';
            }

            aiMsgDiv.innerHTML = contentHtml;
        } catch (error) {
            aiMsgDiv.innerText = '錯誤：無法連線至後端伺服器。';
        }

        // 捲動到底部
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function appendMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }
</script>

</body>
</html>
